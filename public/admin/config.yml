backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://beisser.netlify.app
display_url: https://beisser.netlify.app

collections:
  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

      - label: "Team Workflow"
        name: "teamWorkflow"
        widget: "object"
        required: false
        hint: "Internal implementation tracking used by managers and editors."
        fields:
          - label: "Review Status"
            name: "reviewStatus"
            widget: "select"
            default: "not_started"
            required: false
            hint: "Set current state so dashboard shows this entry in the right queue."
            options:
              - { label: "Not Started", value: "not_started" }
              - { label: "In Review", value: "in_review" }
              - { label: "Blocked", value: "blocked" }
              - { label: "Approved", value: "approved" }
          - { label: "Entry Owner", name: "owner", widget: "string", required: false, hint: "Who owns implementation for this page/section." }
          - { label: "Review Due Date", name: "dueDate", widget: "datetime", required: false, hint: "Target date to complete review and clear to-dos." }
          - { label: "Internal Notes", name: "internalNotes", widget: "text", required: false, hint: "General notes for internal team only (not public)." }
          - label: "Manager Comments"
            name: "managerComments"
            widget: "list"
            required: false
            hint: "Use for review feedback. Add one item per comment thread."
            fields:
              - { label: "Section", name: "section", widget: "string", required: false, hint: "Example: Hero, Brands grid, Community cards." }
              - { label: "Author", name: "author", widget: "string", required: false }
              - { label: "Comment", name: "comment", widget: "text" }
              - { label: "Date", name: "date", widget: "datetime", required: false }
          - label: "To-Do List"
            name: "todoList"
            widget: "list"
            required: false
            hint: "Track implementation tasks for this specific entry."
            fields:
              - { label: "Task", name: "task", widget: "string" }
              - label: "Status"
                name: "status"
                widget: "select"
                default: "todo"
                options:
                  - { label: "To Do", value: "todo" }
                  - { label: "In Progress", value: "in_progress" }
                  - { label: "Done", value: "done" }
              - { label: "Assignee", name: "assignee", widget: "string", required: false }
              - { label: "Due Date", name: "dueDate", widget: "datetime", required: false }
              - { label: "Notes", name: "notes", widget: "text", required: false }
          - label: "Section Notes"
            name: "sectionNotes"
            widget: "list"
            required: false
            hint: "Per-section implementation notes (e.g., Brands, Community, Footer)."
            fields:
              - { label: "Section Name", name: "section", widget: "string" }
              - { label: "Notes", name: "notes", widget: "text", required: false }
              - { label: "Open Questions", name: "openQuestions", widget: "text", required: false }
    sortable_fields: ["title", "updated"]
    summary: "{{title}} — Updated: {{updated | date('MMM D, YYYY')}}"

